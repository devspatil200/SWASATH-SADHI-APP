<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DevFit Coach – Devidas Patil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#0f172a">
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .btn { padding: 14px; border-radius: 12px; font-weight: 600; width: 100%; margin-bottom: 12px; cursor: pointer; border: none; color: white; font-size: 16px; transition: all 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); }
    .btn-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
    .input-box { width: 100%; padding: 14px; margin-bottom: 12px; background: #1e293b; border: 2px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    .input-box:focus { border-color: #10b981; outline: none; }
    .card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 1px solid #334155; margin-bottom: 16px; }
    .plan-item { background: #1e293b; padding: 14px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #10b981; }
    .goal-btn { background: #1e293b; padding: 16px; border-radius: 12px; margin: 8px 0; cursor: pointer; border: 2px solid #334155; transition: all 0.2s; text-align: left; }
    .goal-btn.selected { border-color: #10b981; background: #064e3b; }
    .bmi-box { background: linear-gradient(135deg, #10b981, #059669); padding: 16px; border-radius: 12px; text-align: center; margin: 16px 0; }
  </style>
</head>
<body class="min-h-screen">

<div id="app" class="max-w-md mx-auto p-4">
  <!-- Screens inject here -->
</div>

<script>
// --- DATABASE (LocalStorage) ---
let user = JSON.parse(localStorage.getItem('devfit_user') || 'null');
let plan = JSON.parse(localStorage.getItem('devfit_plan') || 'null');
let logs = JSON.parse(localStorage.getItem('devfit_logs') || '[]');

// --- AI PLANS (Pure Indian) ---
const AI_PLANS = {
  weight_loss: {
    title: "🔥 वजन कमी करणे",
    workout: [
      { day: "सोमवार", ex: "तेज चालणे 30 मि, सायकलिंग 20 मि, स्ट्रेचिंग 10 मि" },
      { day: "मंगळवार", ex: "स्क्वॅट्स 3x15, पुश-अप्स 3x12, प्लॅंक 3x30sec, बर्पीज 3x10" },
      { day: "बुधवार", ex: "जंप स्क्वॅट्स 4x15, माउंटन क्लायमर्स 4x30sec, रस्सी उड्या 10 मि" },
      { day: "गुरुवार", ex: "आराम / हलकी चाल / योगा / प्राणायाम" },
      { day: "शुक्रवार", ex: "लंजेस 3x12, डम्बल रो 3x12, बायसेप कर्ल्स 3x15, क्रंचेस 3x20" },
      { day: "शनिवार", ex: "धावणे 40 मि / पोहणे 20 मि / सायकलिंग 30 मि" },      { day: "रविवार", ex: "हलके स्ट्रेचिंग / चालणे / पूर्ण आराम" }
    ],
    diet: {
      cal: "1200-1500 kcal/दिवस",
      meals: [
        { t: "सकाळी 7-8 वाजता", f: "1 वाटी ओट्स + दूध, 1 कप ग्रीन टी, 2 उकडलेली अंडी (फक्त पांढरा भाग)" },
        { t: "सकाळी 11 वाजता", f: "1 सफरचंद/पपई, 8-10 बदाम (भिजवलेले)" },
        { t: "दुपारी 1-2 वाजता", f: "1 भाकरी (ज्वारी/बाजरी), 1 वाटी डाळ, 1 वाटी भाजी (तेल कमी), मोठे सॅलड, 1 वाटी दही" },
        { t: "संध्याकाळी 5 वाजता", f: "1 कप ग्रीन टी/लिंबू पाणी, 1 वाटी भाजलेले चणे/मखणा" },
        { t: "रात्री 8 वाजता", f: "1 भाकरी (ज्वारी), 1 वाटी पालेभाजी/दही, सॅलड, 1 वाटी मूग डाळ" },
        { t: "झोपण्यापूर्वी", f: "1 ग्लास कोमट पाणी + लिंबू" }
      ],
      tips: ["दिवसाला 3-4 लिटर पाणी प्या", "साखर, मैदा, तळलेले पदार्थ पूर्ण टाळा", "रात्री 8 नंतर काहीही खाऊ नका", "प्रत्येक 3 तासांनी थोडे थोडे खा", "तेल-तुपाचा वापर अर्धा करा"]
    }
  },
  muscle_gain: {
    title: "💪 स्नायू वाढवणे",
    workout: [
      { day: "सोमवार (छाती व ट्रायसेप)", ex: "बेंच प्रेस 4x10, इंक्लाइन डम्बल प्रेस 4x10, केबल फ्लाय 3x12, ट्रायसेप डिप्स 3x12" },
      { day: "मंगळवार (पाठ व बायसेप)", ex: "पुल-अप्स 4x10, बार्बेल रो 4x10, लॅट पुलडाउन 3x12, बार्बेल कर्ल्स 3x12, हॅमर कर्ल्स 3x15" },
      { day: "बुधवार (पाय)", ex: "स्क्वॅट्स 4x10, लेग प्रेस 4x12, लेग कर्ल्स 3x12, लंजेस 3x12, कॉफ रेजेस 4x15" },
      { day: "गुरुवार", ex: "आराम व रिकव्हरी / हलकी चाल" },
      { day: "शुक्रवार (खांदे व Abs)", ex: "मिलिटरी प्रेस 4x10, लेटरल रेजेस 3x12, फ्रंट रेजेस 3x12, श्रग्स 3x15, प्लॅंक 3x60sec" },
      { day: "शनिवार (पूर्ण शरीर)", ex: "डेडलिफ्ट्स 4x8, बेंच प्रेस 3x10, स्क्वॅट्स 3x10, पुल-अप्स 3x10" },
      { day: "रविवार", ex: "पूर्ण आराम / झोप 8 तास" }
    ],
    diet: {
      cal: "2500-3000 kcal/दिवस",
      meals: [
        { t: "सकाळी 7 वाजता", f: "4 अंडी पांढरा + 2 संपूर्ण, 2 पराठे (तूप), 1 ग्लास दूध + केळी, 1 वाटी दही" },
        { t: "सकाळी 10 वाजता", f: "1 प्रोटीन शेक (दूध+केळी+पीनट बटर+ओट्स), 1 मूठ काजू-बदाम" },
        { t: "दुपारी 1 वाजता", f: "4 भाकरी, 200g चिकन/पनीर/मटण, 1.5 वाटी डाळ, 1 वाटी भाजी, 1 वाटी भात, सॅलड, दही" },
        { t: "वर्कआउटपूर्वी (4 वाजता)", f: "2 केळी, 1 कप ब्लॅक कॉफी, 1 मूठ खजूर" },
        { t: "वर्कआउटनंतर (6 वाजता)", f: "1 प्रोटीन शेक, 4 अंडी पांढरा भाग, 1 केळी" },
        { t: "रात्री 9 वाजता", f: "3 भाकरी, 200g मासे/चिकन/पनीर, 1 वाटी डाळ, 1 वाटी भाजी, सॅलड" },
        { t: "झोपण्यापूर्वी", f: "1 ग्लास दूध + 1 चमचा पीनट बटर, 10 बदाम" }
      ],
      tips: ["प्रत्येक 2-3 तासांनी खा", "वजन(kg) x 2g प्रोटीन रोज खा", "दिवसाला 4 लिटर पाणी", "7-8 तास झोप अनिवार्य", "तूप, दूध, पनीर, अंडी जास्त समावेश करा"]
    }
  },
  maintenance: {
    title: "⚡ फिटनेस मेंटेन करणे",
    workout: [
      { day: "सोमवार (वरचे शरीर)", ex: "पुश-अप्स 3x15, डम्बल प्रेस 3x12, रो 3x12, शोल्डर प्रेस 3x12" },
      { day: "मंगळवार (खालचे शरीर)", ex: "स्क्वॅट्स 3x15, लंजेस 3x12, कॉफ रेजेस 3x15, ग्लूट ब्रिज 3x15" },
      { day: "बुधवार (कार्डिओ)", ex: "30 मि जॉगिंग, सायकलिंग 20 मि, रस्सी उड्या 10 मि" },
      { day: "गुरुवार", ex: "योगा / सूर्य नमस्कार 5 वेळा / हलके स्ट्रेचिंग" },
      { day: "शुक्रवार (Core)", ex: "प्लॅंक 3x45sec, क्रंचेस 3x20, लेग रेजेस 3x15, रशियन ट्विस्ट 3x20" },
      { day: "शनिवार (Active)", ex: "खेळ (क्रिकेट/बॅडमिंटन), पोहणे, ट्रेकिंग" },
      { day: "रविवार", ex: "पूर्ण आराम" }    ],
    diet: {
      cal: "1800-2200 kcal/दिवस",
      meals: [
        { t: "सकाळी 7-8 वाजता", f: "1 वाटी पोहे/उपमा/इडली (2-3), 1 कप चहा/दूध, 1 वाटी फruits" },
        { t: "सकाळी 11 वाजता", f: "1 केळी/सफरचंद, 1 मूठ भुजलेले चणे" },
        { t: "दुपारी 1-2 वाजता", f: "2 भाकरी, 1 वाटी डाळ, 1 वाटी भाजी, 1 वाटी भात (ऑप्शनल), सॅलड, दही" },
        { t: "संध्याकाळी 5 वाजता", f: "1 कप चहा/कॉफी, 2 बिस्किटे/1 वाटी sprouts" },
        { t: "रात्री 8-9 वाजता", f: "2 भाकरी, 1 वाटी डाळ, 1 वाटी भाजी, सॅलड, दही" },
        { t: "झोपण्यापूर्वी", f: "1 ग्लास कोमट दूध" }
      ],
      tips: ["संतुलित आहार", "नियमित व्यायाम", "8 तास झोप", "दिवसाला 3 लिटर पाणी", "आठवड्यातून 5 दिवस ऍक्टिव्ह राहा"]
    }
  }
};

// --- APP LOGIC ---
function render() {
  const app = document.getElementById('app');
  if (!user) return showOnboarding(app);
  if (!plan) return showGoalSelect(app);
  return showDashboard(app);
}

function showOnboarding(app) {
  app.innerHTML = `
    <div class="card mt-8">
      <h1 class="text-3xl font-bold text-emerald-400 mb-2">🏋️ DevFit Coach</h1>
      <p class="text-gray-400 mb-6">Devidas Patil – Advanced Fitness Tracking</p>
      <input id="u-name" class="input-box" placeholder="तुमचे नाव टाका">
      <button onclick="saveUser()" class="btn btn-green text-lg">🚀 सुरुवात करा</button>
      <p class="text-xs text-gray-500 text-center mt-4">Login नाही. फक्त नाव पुरेसे आहे.</p>
    </div>
  `;
}

function saveUser() {
  const name = document.getElementById('u-name').value.trim();
  if (!name) return alert("कृपया नाव टाका");
  user = { name, createdAt: new Date().toISOString() };
  localStorage.setItem('devfit_user', JSON.stringify(user));
  render();
}

function showGoalSelect(app) {
  app.innerHTML = `
    <div class="card mt-4">
      <h2 class="text-2xl font-bold mb-4">👋 नमस्कार ${user.name}!</h2>
      <p class="text-gray-400 mb-4">तुमचे ध्येय निवडा. आम्ही तुमच्यासाठी ऑटोमॅटिक प्लॅन तयार करू.</p>
            <input id="u-age" class="input-box" type="number" placeholder="वय (years)">
      <div class="flex gap-2 mb-4">
        <input id="u-weight" class="input-box" type="number" placeholder="वजन (kg)">
        <input id="u-height" class="input-box" type="number" placeholder="उंची (cm)">
      </div>

      <h3 class="font-bold mb-3">🎯 तुमचे ध्येय:</h3>
      <div class="goal-btn" onclick="selectGoal('weight_loss', this)">
        <div class="font-bold text-orange-400">🔥 वजन कमी करणे</div>
        <div class="text-sm text-gray-400">Fat कमी करा आणि lean व्हा</div>
      </div>
      <div class="goal-btn" onclick="selectGoal('muscle_gain', this)">
        <div class="font-bold text-blue-400">💪 स्नायू वाढवणे</div>
        <div class="text-sm text-gray-400">Muscle आणि strength वाढवा</div>
      </div>
      <div class="goal-btn" onclick="selectGoal('maintenance', this)">
        <div class="font-bold text-green-400">⚡ फिटनेस मेंटेन करणे</div>
        <div class="text-sm text-gray-400">स्वस्थ आणि तंदुरुस्त राहा</div>
      </div>
      <input type="hidden" id="sel-goal">
      
      <input id="u-issues" class="input-box mt-4" placeholder="आरोग्य समस्या (Optional)">
      <button onclick="generatePlan()" class="btn btn-purple text-lg mt-2">✨ माझा प्लॅन तयार करा</button>
    </div>
  `;
}

function selectGoal(goal, el) {
  document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('sel-goal').value = goal;
}

function generatePlan() {
  const age = document.getElementById('u-age').value;
  const weight = document.getElementById('u-weight').value;
  const height = document.getElementById('u-height').value;
  const goal = document.getElementById('sel-goal').value;
  const issues = document.getElementById('u-issues').value.trim() || "None";

  if (!age || !weight || !height || !goal) return alert("कृपया सर्व माहिती भरा आणि ध्येय निवडा");

  const hM = height / 100;
  const bmi = (weight / (hM * hM)).toFixed(1);
  const cat = bmi < 18.5 ? "Underweight" : bmi < 25 ? "Normal" : bmi < 30 ? "Overweight" : "Obese";

  plan = {
    userId: user.name,
    age: +age, weight: +weight, height: +height,
    bmi, bmiCat: cat, goal, issues,    workout: AI_PLANS[goal].workout,
    diet: AI_PLANS[goal].diet,
    generatedAt: new Date().toISOString()
  };

  localStorage.setItem('devfit_plan', JSON.stringify(plan));
  alert(`✅ प्लॅन तयार!\nBMI: ${bmi} (${cat})\nध्याय: ${AI_PLANS[goal].title}`);
  render();
}

function showDashboard(app) {
  app.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-emerald-400">💪 ${user.name}</h2>
      <button onclick="resetApp()" class="text-red-400 text-sm">🔄 Reset</button>
    </div>

    <div class="bmi-box">
      <div class="text-sm opacity-90">BMI</div>
      <div class="text-4xl font-bold">${plan.bmi}</div>
      <div class="text-sm mt-1">${plan.bmiCat}</div>
      <div class="text-xs mt-2 opacity-80">Goal: ${AI_PLANS[plan.goal].title}</div>
    </div>

    <div class="flex gap-2 mb-4">
      <button onclick="switchTab('workout')" id="btn-workout" class="btn btn-blue flex-1 py-3">🏋️ Workout</button>
      <button onclick="switchTab('diet')" id="btn-diet" class="btn btn-orange flex-1 py-3">🥗 Indian Diet</button>
    </div>

    <div id="tab-workout">
      <h3 class="font-bold mb-3 text-lg">📅 Weekly Plan</h3>
      ${plan.workout.map(d => `
        <div class="plan-item">
          <div class="font-bold text-emerald-300">${d.day}</div>
          <div class="text-sm text-gray-300 mt-1">${d.ex}</div>
        </div>
      `).join('')}
    </div>

    <div id="tab-diet" class="hidden">
      <div class="card mb-4">
        <div class="text-sm text-gray-400">Daily Calories</div>
        <div class="text-2xl font-bold text-orange-400">${plan.diet.cal}</div>
      </div>
      <h3 class="font-bold mb-3 text-lg">️ Meal Plan</h3>
      ${plan.diet.meals.map(m => `
        <div class="plan-item" style="border-left-color:#f97316;">
          <div class="font-bold text-orange-300">${m.t}</div>
          <div class="text-sm text-gray-300 mt-1">${m.f}</div>
        </div>      `).join('')}
      <div class="card mt-4">
        <h4 class="font-bold mb-2 text-emerald-400">💡 Tips</h4>
        <ul class="text-sm space-y-1">${plan.diet.tips.map(t => `<li class="text-gray-300">✓ ${t}</li>`).join('')}</ul>
      </div>
    </div>

    <button onclick="showLogForm()" class="btn btn-green mt-4">📝 Log Today's Workout</button>

    <div class="mt-6">
      <h3 class="font-bold mb-3">📊 Recent Logs</h3>
      <div id="logs-list">${logs.length ? logs.slice().reverse().map(l => `
        <div class="bg-slate-800 p-3 rounded-lg mb-2 flex justify-between items-center">
          <div>
            <div class="font-semibold text-emerald-300">${l.ex}</div>
            <div class="text-sm text-gray-400">${l.sets} sets × ${l.reps} reps • ${l.wt} kg</div>
          </div>
          <div class="text-xs text-gray-500">${new Date(l.date).toLocaleDateString()}</div>
        </div>
      `).join('') : '<p class="text-gray-500 text-center py-4">अजून कोणतेही workout log केलेले नाही.</p>'}</div>
    </div>
  `;
  switchTab('workout');
}

function switchTab(tab) {
  document.getElementById('tab-workout').classList.add('hidden');
  document.getElementById('tab-diet').classList.add('hidden');
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  
  document.getElementById('btn-workout').className = `btn flex-1 py-3 ${tab === 'workout' ? 'btn-blue' : 'bg-slate-700 text-gray-300'}`;
  document.getElementById('btn-diet').className = `btn flex-1 py-3 ${tab === 'diet' ? 'btn-orange' : 'bg-slate-700 text-gray-300'}`;
}

function showLogForm() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card mt-10">
      <h2 class="text-2xl font-bold mb-4">📝 Log Workout</h2>
      <input id="log-ex" class="input-box" placeholder="Exercise Name">
      <div class="flex gap-2 mb-4">
        <input id="log-sets" class="input-box" type="number" placeholder="Sets">
        <input id="log-reps" class="input-box" type="number" placeholder="Reps">
        <input id="log-wt" class="input-box" type="number" placeholder="Weight (kg)">
      </div>
      <button onclick="saveLog()" class="btn btn-green">💾 Save</button>
      <button onclick="render()" class="btn btn-blue mt-2">← Back</button>
    </div>
  `;
}
function saveLog() {
  const ex = document.getElementById('log-ex').value.trim();
  const sets = document.getElementById('log-sets').value;
  const reps = document.getElementById('log-reps').value;
  const wt = document.getElementById('log-wt').value || '0';
  if (!ex || !sets || !reps) return alert("Exercise, Sets & Reps आवश्यक आहेत.");
  
  logs.push({ ex, sets, reps, wt, date: new Date().toISOString() });
  localStorage.setItem('devfit_logs', JSON.stringify(logs));
  alert("✅ Workout logged!");
  render();
}

function resetApp() {
  if (confirm("सर्व data delete होईल. खात्री आहे?")) {
    localStorage.clear();
    location.reload();
  }
}

// Init
render();
</script>
</body>
</html>
